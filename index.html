<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff8a3d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="レジごっこ" />

    <meta name="description" content="スマホのカメラでバーコードをピッ!とよみとって遊べる、子供向けのレジごっこWebアプリ。家にある食品やおもちゃのバーコードで、お買い物ごっこが楽しめます。インストール不要・無料。" />
    <meta name="keywords" content="レジごっこ,お店屋さんごっこ,バーコード,QRコード,子供,知育,アプリ,Web,無料,お買い物,キッズ,幼児" />
    <meta name="author" content="nisioka" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{SITE_URL}}" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="レジごっこ" />
    <meta property="og:title" content="レジごっこ - バーコードでピッ!と遊べる子供向けレジアプリ" />
    <meta property="og:description" content="スマホのカメラでバーコードをピッ!とよみとって遊べる、子供向けのレジごっこWebアプリ。家にある食品やおもちゃのバーコードで、お買い物ごっこが楽しめます。" />
    <meta property="og:url" content="{{SITE_URL}}" />
    <meta property="og:image" content="{{SITE_URL}}icon-512.png" />
    <meta property="og:locale" content="ja_JP" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="レジごっこ - バーコードでピッ!と遊べる子供向けレジアプリ" />
    <meta name="twitter:description" content="スマホのカメラでバーコードをピッ!とよみとって遊べる、子供向けのレジごっこWebアプリ。家にある食品やおもちゃのバーコードで、お買い物ごっこが楽しめます。" />
    <meta name="twitter:image" content="{{SITE_URL}}icon-512.png" />

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>レジごっこ - バーコードでピッ!と遊べる子供向けレジアプリ</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>レジごっこ</h1>
      </header>

      <main>
        <section id="start-screen" class="screen">
          <div class="start-illustration">🛒</div>
          <p class="start-message">バーコードをピッ!とよみとってあそぼう</p>
          <button id="start-button" class="primary-button">スタート</button>
          <p id="error-message" class="error-message hidden"></p>
        </section>

        <section id="play-screen" class="screen hidden">
          <div id="reader" class="reader"></div>

          <div id="last-item" class="last-item hidden">
            <div class="last-item-name"></div>
            <div class="last-item-price"></div>
          </div>

          <div class="totals">
            <div class="totals-row">
              <span class="totals-label">てんすう</span>
              <span id="count" class="totals-value">0</span>
            </div>
            <div class="totals-row totals-row-main">
              <span class="totals-label">ごうけい</span>
              <span id="total" class="totals-value">0えん</span>
            </div>
          </div>

          <button id="pay-button" class="primary-button">おしはらい</button>
        </section>

        <section id="thanks-screen" class="screen hidden">
          <div class="thanks-emoji">🎉</div>
          <p class="thanks-message">ありがとう!</p>
          <p id="thanks-total" class="thanks-total"></p>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
